<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Esplora con Bambu">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234D96FF'/><text y='.9em' font-size='80'>🐼</text></svg>">
<title>Esplora con Bambu!</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --c1:#FF6B6B;--c2:#FFD93D;--c3:#6BCB77;--c4:#4D96FF;--c5:#FF6FC8;--c6:#A855F7;
  --bg:#FFF9F0;--card:#fff;--shadow:0 4px 20px rgba(0,0,0,0.12);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);min-height:100vh;min-height:-webkit-fill-available;overflow-x:hidden;-webkit-font-smoothing:antialiased;touch-action:manipulation}
button{cursor:pointer;border:none;outline:none;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

/* SCREENS */
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center}
.screen.active{display:flex}

/* HEADER */
.top-bar{width:100%;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.stars-bar{display:flex;gap:4px;align-items:center;font-size:22px}
.star-count{font-size:18px;font-weight:700;color:#FFD93D;margin-left:4px}
.btn-back{background:none;font-size:28px;padding:4px 8px}

/* BAMBU */
.bambu-wrap{position:relative;display:flex;flex-direction:column;align-items:center;margin:10px 0}
.bambu{width:120px;height:120px;transition:transform .3s}
.bambu.bounce{animation:bounce .5s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
.bambu.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
.bubble{background:#fff;border:3px solid #FFD93D;border-radius:20px;padding:10px 16px;max-width:260px;text-align:center;font-size:15px;font-weight:600;color:#333;margin-top:8px;position:relative;box-shadow:var(--shadow)}
.bubble::before{content:'';position:absolute;top:-14px;left:50%;transform:translateX(-50%);border:7px solid transparent;border-bottom-color:#FFD93D}

/* HOME */
#home{background:linear-gradient(160deg,#e0f7ff 0%,#fff9f0 100%)}
.home-title{font-size:38px;font-weight:800;color:#333;margin:20px 0 4px;text-align:center}
.home-sub{font-size:17px;color:#888;margin-bottom:16px}
.worlds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;padding:16px 20px;width:100%;max-width:680px}
.world-btn{background:var(--card);border-radius:20px;padding:18px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:var(--shadow);transition:transform .2s;border:3px solid transparent;font-size:15px;font-weight:700;color:#333}
.world-btn:active{transform:scale(.95)}
.world-btn span.ico{font-size:48px}

/* WORLD SELECT */
#world-screen{background:#fff}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;padding:16px 20px;width:100%;max-width:640px}
.game-btn{background:var(--card);border-radius:20px;padding:20px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:var(--shadow);transition:transform .2s;font-size:15px;font-weight:700;color:#333;border:3px solid transparent}
.game-btn:active{transform:scale(.95)}
.game-btn span.ico{font-size:42px}
.world-title{font-size:26px;font-weight:800;margin:12px 0 0;color:#333}

/* GAME SCREEN */
#game-screen{background:var(--bg)}
.game-area{width:100%;max-width:620px;padding:12px 20px;flex:1;display:flex;flex-direction:column;align-items:center;gap:12px}
.game-question{font-size:20px;font-weight:700;color:#333;text-align:center;background:#fff;border-radius:16px;padding:14px 20px;box-shadow:var(--shadow);width:100%}
.options-grid{display:grid;gap:12px;width:100%}
.opt-btn{border-radius:18px;padding:16px;font-size:32px;display:flex;flex-direction:column;align-items:center;gap:6px;box-shadow:var(--shadow);background:#fff;border:4px solid transparent;transition:transform .15s,border-color .2s;font-weight:700;color:#444;font-family:inherit}
.opt-btn span.lbl{font-size:15px;font-weight:700}
.opt-btn:active{transform:scale(.93)}
.opt-btn.correct{border-color:#6BCB77;background:#f0fff4;animation:pop .4s}
.opt-btn.wrong{border-color:#FF6B6B;background:#fff0f0;animation:wobble .4s}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes wobble{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* STARS CELEBRATION */
.celebration{position:fixed;top:0;left:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.35);z-index:100;flex-direction:column;gap:12px}
.celebration.show{display:flex}
.cel-box{background:#fff;border-radius:24px;padding:28px 36px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.cel-stars{font-size:44px;letter-spacing:4px}
.cel-msg{font-size:22px;font-weight:800;color:#333;margin:8px 0}
.cel-btn{background:#FFD93D;border-radius:14px;padding:12px 32px;font-size:17px;font-weight:800;color:#333;margin-top:10px;box-shadow:0 4px 12px rgba(255,217,61,0.5)}

/* confetti */
.confetti-c{position:fixed;pointer-events:none;top:0;left:0;width:100%;height:100%;z-index:99}

/* iPad layout */
@media(min-width:768px){
  .worlds-grid{grid-template-columns:repeat(4,1fr);max-width:780px}
  .games-grid{grid-template-columns:repeat(3,1fr);max-width:700px}
  .opt-btn{padding:22px;font-size:40px}
  .opt-btn span.lbl{font-size:18px}
  .bambu{width:150px;height:150px}
  .bubble{font-size:17px;max-width:320px}
  .game-question{font-size:24px;padding:18px 24px}
  .home-title{font-size:44px}
  .world-btn span.ico{font-size:58px}
  .world-btn{font-size:17px;padding:22px 14px}
  .game-btn span.ico{font-size:52px}
  .game-btn{font-size:17px;padding:24px 14px}
  .cel-box{padding:36px 52px}
  .cel-stars{font-size:52px}
  .cel-msg{font-size:26px}
  .cel-btn{font-size:20px;padding:16px 40px}
  .game-area{max-width:720px}
}

/* iPad Pro / landscape */
@media(min-width:1024px){
  .worlds-grid{grid-template-columns:repeat(4,1fr);max-width:900px}
  .options-grid{grid-template-columns:repeat(4,1fr)!important}
  .opt-btn{font-size:44px}
}

/* Small phones */
@media(max-width:480px){
  .worlds-grid{grid-template-columns:repeat(2,1fr)}
  .games-grid{grid-template-columns:repeat(2,1fr)}
  .home-title{font-size:28px}
  .bambu{width:90px;height:90px}
}
</style>
</head>

  casa:{name:'🏠 Casa',color:'#FF6B6B',

    games:[

const BAMBU_CORRECT=['Fantastico! 🎉','Bravissimo! ⭐','Esatto! Sei un campione! 🏆','Perfetto! Bambu è fiero di te! 🐼','Wow, giusto! Sei super! 🌟'];
const BAMBU_WRONG=['Ops! Riprova! Guarda bene... 👀','Non è quella! Dai, ce la fai! 💪','Quasi! Pensa ancora... 🤔','No no! Ma sei quasi arrivato! 😊','Riprova! Bambu crede in te! 🐼'];
const BAMBU_INTRO={forme:'Abbiniamo le forme! Tocca quella giusta! 🔷',colori:'Che belli i colori! Tocca quello giusto! 🎨',lettere:'Le lettere dell\'alfabeto! Tocca quella che vedi! 🔤',animali:'Gli animali della fattoria! Chi fa quel verso? 🐮',numeri:'Contiamo insieme! Quanti ne vedi? 🔢',verdure:'Le verdure dell\'orto! Sai quale è? 🥕',insetti:'Gli insettini del parco! Li conosci? 🦋',alberi:'La natura del parco! Sai rispondere? 🌳',pesci:'Gli animali del mare! Li conosci? 🐠',colori_mare:'I colori del mare! Belli vero? 🌊',animali_mont:'Gli animali di montagna! Li conosci? 🦅',stagioni:'Le quattro stagioni! Sai qual è? 🍂',lettere_scuola:'L\'alfabeto! Che lettera è? 🔤',numeri_scuola:'I numeri! Sei bravo a contare? 🔢',strumenti:'Gli strumenti di scuola! Li conosci? ✏️',pianeti:'Lo spazio! Sai la risposta? 🪐',alieni:'Il pianeta Zog! Conosci Zog? 👽'};

let curWorld='',curGame=null,curQ=0,totalStars=0,answered=false,wrongShown=false;

function goHome(){showScreen('home');setBubble('home','Ciao! Sono Bambu! 🐼<br>Scegli un mondo da esplorare!')}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)}
function updateStars(){document.querySelectorAll('.star-count').forEach(el=>el.textContent=totalStars)}

function openWorld(w){
  curWorld=w;
  const wd=WORLDS[w];
  document.getElementById('world-title').textContent=wd.name;
  document.getElementById('ws-stars').textContent=totalStars;
  const grid=document.getElementById('games-grid');
  grid.innerHTML='';
  wd.games.forEach(g=>{
    const btn=document.createElement('button');
    btn.className='game-btn';
    btn.style.borderColor=wd.color;
    btn.innerHTML=`<span class="ico">${g.ico}</span>${g.name}`;
    btn.onclick=()=>startGame(w,g.id);
    grid.appendChild(btn);
  });
  setBubble('world',`Benvenuto in ${wd.name}! Che gioco scegli? 🎮`);
  bounceBambu('world');
  showScreen('world-screen');
}

function startGame(w,gid){
  curWorld=w;curQ=0;answered=false;wrongShown=false;
  curGame=WORLDS[w].games.find(g=>g.id===gid);
  document.getElementById('game-title-bar').textContent=curGame.name;
  setBubble('game',BAMBU_INTRO[gid]||'Sei pronto? Tocca la risposta giusta! 🎯');
  bounceBambu('game');
  renderQuestion();
  showScreen('game-screen');
}

function backToWorld(){openWorld(curWorld)}

function renderQuestion(){
  if(!curGame||curQ>=curGame.questions.length)return;
  const q=curGame.questions[curQ];
  document.getElementById('game-question').textContent=q.q;
  const grid=document.getElementById('options-grid');
  grid.style.gridTemplateColumns='repeat(2,1fr)';
  grid.innerHTML='';
  answered=false;wrongShown=false;
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.innerHTML=`<span style="font-size:36px">${opt.e}</span><span class="lbl">${opt.l}</span>`;
    btn.onclick=()=>checkAnswer(i,btn,q);
    grid.appendChild(btn);
  });
}

function checkAnswer(idx,btn,q){
  if(answered)return;
  if(idx===q.a){
    answered=true;
    btn.classList.add('correct');
    totalStars++;
    updateStars();
    bounceBambu('game');
    const msg=BAMBU_CORRECT[Math.floor(Math.random()*BAMBU_CORRECT.length)];
    setBubble('game',msg);
    setTimeout(()=>showCelebration(msg),600);
  } else {
    btn.classList.add('wrong');
    setTimeout(()=>btn.classList.remove('wrong'),400);
    if(!wrongShown){
      wrongShown=true;
      shakeBambu('game');
      setBubble('game',BAMBU_WRONG[Math.floor(Math.random()*BAMBU_WRONG.length)]);
      setTimeout(()=>{
        document.querySelectorAll('.opt-btn').forEach((b,i)=>{
          if(i===q.a)b.style.outline='3px dashed #FFD93D';
        });
      },1000);
    }
  }
}

function showCelebration(msg){
  const strs=totalStars>=10?'⭐⭐⭐':totalStars>=5?'⭐⭐':'⭐';
  document.getElementById('cel-stars').textContent=strs;
  document.getElementById('cel-msg').textContent=msg;
  document.getElementById('cel-sub').textContent=`Stelle totali: ${totalStars} ⭐`;
  document.getElementById('celebration').classList.add('show');
  launchConfetti();
}

function nextQuestion(){
  document.getElementById('celebration').classList.remove('show');
  curQ++;
  if(curQ>=curGame.questions.length){
    setBubble('game','Hai finito tutto! Sei un campione! 🏆 Scegli un altro gioco!');
    bounceBambu('game');
    setTimeout(()=>backToWorld(),2000);
  } else {
    renderQuestion();
    setBubble('game','Prossima domanda! Dai che ce la fai! 💪');
  }
}

function setBubble(screen,text){const el=document.getElementById('bubble-'+screen);if(el)el.innerHTML=text}
function bounceBambu(screen){const el=document.getElementById('bambu-'+screen);if(!el)return;el.classList.remove('bounce');void el.offsetWidth;el.classList.add('bounce')}
function shakeBambu(screen){const el=document.getElementById('bambu-'+screen);if(!el)return;el.classList.remove('shake');void el.offsetWidth;el.classList.add('shake')}

function launchConfetti(){
  const c=document.getElementById('confetti-c');
  const ctx=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const colors=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF6FC8','#A855F7'];
  const pieces=[];
  for(let i=0;i<80;i++)pieces.push({x:Math.random()*c.width,y:-20,r:Math.random()*8+4,color:colors[Math.floor(Math.random()*colors.length)],speed:Math.random()*4+2,rot:Math.random()*360,rotS:Math.random()*6-3});
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    pieces.forEach(p=>{p.y+=p.speed;p.rot+=p.rotS;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);ctx.restore()});
    frame++;
    if(frame<90)requestAnimationFrame(draw);else ctx.clearRect(0,0,c.width,c.height);
  }
  draw();
}
